version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: rakaez-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rakaez-network

  backend:
    build: .
    container_name: rakaez-backend
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/rakaez-erp
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_key
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - rakaez-network
    restart: unless-stopped

  dashboard:
    image: node:18-alpine
    container_name: rakaez-dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    networks:
      - rakaez-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  rakaez-network:
    driver: bridge
